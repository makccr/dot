    ws-icon-1 = office;´ê¡
    ws-icon-2 = graphics;´ê¡
    ws-icon-3 = mail;´ê¡
    ws-icon-4 = web;´ê¡
    ws-icon-default = "´ê¡"
    format = <label-state> <label-mode>
    label-monitor = %name%
    label-dimmed-empty-foreground = ${colors.gray}
    label-focused = "¯®▒"
    label-focused-foreground = ${colors.cyan}
    label-occupied = %icon%
    label-urgent = %icon%
