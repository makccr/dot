    exec = ~/.config/polybar/wifi-status.sh
    interval = 5
    label = "%output%"

[module/brightness]
    type = custom/script
    exec = bash -c 'echo " ¾░âá $(( $(brightnessctl g) * 100 / $(brightnessctl m) ))%"'
    interval = .3 
    click-left = brightnessctl set +5%
