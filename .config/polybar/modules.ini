[module/audio]
    type = internal/pulseaudio
    sink = alsa_output.pci-0000_12_00.3.analog-stereo
    use-ui-max = true
    format-volume = <ramp-volume> <label-volume>
    label-muted = "´Çª "
    ramp-volume-0 = "´Çº "
    ramp-volume-1 = "´Ç¿ "
    click-right = "amixer sset Master 5%-"
    click-left = "amixer sset Master 5%+"
    scroll-up = "amixer sset Master 5%+"
    scroll-down = "amixer sset Master 5%-"
    click-middle = "pavucontrol"
    interval = 5
    label-active-font = 1

[module/date]
    type = internal/date
    interval = 5
    date = %a %d 
    time = %k:%M 
    label = %{T3}%date%%{T-} %time%

[module/battery]
    type = internal/battery
    battery = BAT0
    adapter = ADP1
    full-at = 98
    format-charging = <animation-charging> <label-charging>
    format-discharging = <animation-discharging> <label-discharging>
    format-discharging-underline = ${self.format-charging-underline}
    format-full-prefix = "´ëÇ "
    format-full-prefix-foreground = ${colors.fg}
    format-full-underline = ${self.format-charging-underline}
    ramp-capacity-0 = ´ëÇ
    ramp-capacity-1 = ´ëÇ
    ramp-capacity-2 = ´ëÇ
    ramp-capacity-foreground = ${colors.fg}
    animation-charging-0 = "´ëä "
    animation-charging-1 = "´ëé "
    animation-charging-2 = "´ëÇ "
    animation-charging-foreground = ${colors.green}
    animation-charging-framerate = 750
    animation-discharging-0 = "´ëÇ "
    animation-discharging-1 = "´ëé "
    animation-discharging-2 = "´ëä "
    animation-discharging-foreground = ${colors.red}
    animation-discharging-framerate = 750

[module/powermenu]
    type = custom/menu
    expand-left = true
    format-spacing = 2
    label-open = "´âë  "
    label-close = "´äÇ"
    label-separator = " "
    label-separator-foreground = ${colors.fg}
    menu-0-0 = "´âó"
    menu-0-0-exec = sudo reboot
    menu-0-1 = "´Çæ"
    menu-0-1-exec = sudo poweroff

[module/xwindow]
    type = internal/xwindow
    format = <label>
    label = %title%
    label-maxlen = 50
    label-empty = " "

[module/shot]
    type = custom/script
    exec = echo "´Ç░"
    click-left = "flameshot screen -p ~/Downloads/"
    click-right = "flameshot gui"

[module/term]
    type = custom/script
    exec = echo "´îâ"
    click-left = "xlock -mode blank"

[module/workspaces]
