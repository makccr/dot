[module/yt]
    type = custom/script
    interval = 1800
    format-prefix = "´à¬   "
    format = <label>
    exec = ~/.config/polybar/sub.py

[module/color]
    type = custom/script
    exec = echo "´Üó"
    click-left = "gpick"

